services:
  backend:
    build:
      context: ./apps/backend
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
    env_file:
      - ./apps/backend/.env

  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    env_file:
      - ./apps/frontend/.env.local
    environment:
      - CHOKIDAR_USEPOLLING=true # Helps with hot-reloading on Windows via Docker
    depends_on:
      - backend

volumes:
  frontend_node_modules:
  frontend_next:
