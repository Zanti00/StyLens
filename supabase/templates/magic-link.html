<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to StyLens</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f8fafc; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #0f172a; }
        .wrapper { width: 100%; background-color: #f8fafc; padding-bottom: 40px; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 24px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .header { padding: 40px 40px 20px 40px; text-align: center; }
        .logo { display: inline-block; width: 48px; height: 48px; background-color: #0f172a; border-radius: 12px; color: #ffffff; font-size: 24px; font-weight: bold; line-height: 48px; text-align: center; text-decoration: none; }
        .brand-name { display: block; margin-top: 12px; font-size: 20px; font-weight: 800; color: #0f172a; }
        .content { padding: 20px 40px 40px 40px; text-align: center; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 16px; color: #0f172a; }
        p { font-size: 16px; line-height: 24px; color: #475569; margin-bottom: 24px; }
        .button { display: inline-block; background-color: #0f172a; color: #ffffff !important; padding: 16px 32px; border-radius: 16px; font-weight: 700; text-decoration: none; }
        .footer { padding: 40px; text-align: center; border-top: 1px solid #f1f5f9; }
        .footer-text { font-size: 13px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <div class="logo">S</div>
                <span class="brand-name">StyLens</span>
            </div>
            <div class="content">
                <h1>Log in to StyLens</h1>
                <p>Click the button below to log in to your StyLens account instantly. This link will expire in 24 hours.</p>
                <div style="margin: 32px 0;">
                    <a href="{{ .ConfirmationURL }}" class="button">Log In to StyLens</a>
                </div>
                <p style="font-size: 14px; color: #94a3b8;">If you didn't request this email, you can safely ignore it.</p>
            </div>
            <div class="footer">
                <p class="footer-text">© 2026 StyLens. Crafted for style.</p>
            </div>
        </div>
    </div>
</body>
</html>
